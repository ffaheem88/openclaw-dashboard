<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 Agent Identity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #0f1420;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-highlight: rgba(255, 255, 255, 0.12);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-cyan: #06b6d4;
      --accent-purple: #8b5cf6;
      --accent-pink: #ec4899;
      --accent-emerald: #10b981;
      --accent-amber: #f59e0b;
      --accent-rose: #f43f5e;
      --accent-blue: #3b82f6;
      --gradient-primary: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 50%, #ec4899 100%);
      --gradient-card: linear-gradient(135deg, rgba(6, 182, 212, 0.1) 0%, rgba(139, 92, 246, 0.05) 100%);
      --shadow-glow: 0 0 40px rgba(6, 182, 212, 0.15);
      --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(6,182,212,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(236,72,153,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: backgroundPulse 15s ease-in-out infinite;
    }

    @keyframes backgroundPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
      animation: float 20s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink)); bottom: -50px; right: -50px; animation-delay: -10s; }
    .orb-3 { width: 200px; height: 200px; background: linear-gradient(135deg, var(--accent-emerald), var(--accent-cyan)); top: 50%; right: 10%; animation-delay: -5s; }

    @keyframes float {
      0%, 100% { transform: translate(0,0) rotate(0deg); }
      25% { transform: translate(20px,-20px) rotate(5deg); }
      50% { transform: translate(-10px,20px) rotate(-5deg); }
      75% { transform: translate(-20px,-10px) rotate(3deg); }
    }

    /* Header */
    .header {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 40px;
      background: linear-gradient(180deg, rgba(10,14,23,0.95) 0%, transparent 100%);
      border-bottom: 1px solid var(--glass-border);
    }

    .header-left h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    .nav-link:hover, .nav-link.active {
      color: var(--text-primary);
      background: rgba(6,182,212,0.1);
      border-color: rgba(6,182,212,0.3);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(6,182,212,0.2);
    }

    /* Page header */
    .page-header {
      position: relative;
      z-index: 10;
      padding: 32px 40px 16px;
    }

    .page-header h2 {
      font-size: 24px;
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-header p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 4px;
    }

    /* Two-column layout */
    .layout {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: 30% 70%;
      gap: 20px;
      padding: 0 40px 40px;
      height: calc(100vh - 200px);
    }

    /* Glass panel */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .glass-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
    }

    /* Left panel */
    .file-tree {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .file-tree::-webkit-scrollbar { width: 4px; }
    .file-tree::-webkit-scrollbar-track { background: transparent; }
    .file-tree::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 12px 0 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-label:first-child { padding-top: 0; }

    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      margin-bottom: 2px;
    }

    .file-item:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--glass-border);
    }

    .file-item.active {
      background: rgba(6,182,212,0.08);
      border-color: rgba(6,182,212,0.3);
      box-shadow: 0 0 20px rgba(6,182,212,0.05);
    }

    .file-icon { font-size: 16px; flex-shrink: 0; }

    .file-info { flex: 1; min-width: 0; }

    .file-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .memory-toggle {
      cursor: pointer;
      user-select: none;
    }

    .memory-toggle-arrow {
      transition: transform 0.2s ease;
      font-size: 12px;
    }

    .memory-toggle-arrow.collapsed { transform: rotate(-90deg); }

    .memory-list { overflow: hidden; transition: max-height 0.3s ease; }
    .memory-list.collapsed { max-height: 0; }

    /* Right panel */
    .content-panel {
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .content-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }

    .breadcrumb {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      margin-bottom: 8px;
    }

    .breadcrumb span { color: var(--accent-cyan); }

    .file-meta-bar {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .meta-label {
      color: var(--text-muted);
      font-size: 11px;
    }

    .refresh-indicator {
      margin-left: auto;
      font-size: 11px;
      color: var(--accent-cyan);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .refresh-indicator.visible { opacity: 1; }

    .content-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .content-body::-webkit-scrollbar { width: 6px; }
    .content-body::-webkit-scrollbar-track { background: transparent; }
    .content-body::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }
    .content-body::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    .content-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      gap: 12px;
    }

    .content-empty .empty-icon { font-size: 48px; opacity: 0.5; }

    /* Markdown rendering */
    .md-content {
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.8;
      color: var(--text-secondary);
    }

    .md-content h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 24px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--glass-border);
      font-family: 'Inter', sans-serif;
    }

    .md-content h2 {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent-cyan);
      margin: 20px 0 10px;
      font-family: 'Inter', sans-serif;
    }

    .md-content h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent-purple);
      margin: 16px 0 8px;
      font-family: 'Inter', sans-serif;
    }

    .md-content h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-amber);
      margin: 12px 0 6px;
      font-family: 'Inter', sans-serif;
    }

    .md-content p { margin: 8px 0; }

    .md-content ul, .md-content ol {
      margin: 8px 0 8px 20px;
    }

    .md-content li { margin: 4px 0; }

    .md-content code {
      background: rgba(6,182,212,0.1);
      border: 1px solid rgba(6,182,212,0.2);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 12px;
      color: var(--accent-cyan);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .md-content pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 16px;
      margin: 12px 0;
      overflow-x: auto;
    }

    .md-content pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--accent-emerald);
      font-size: 12px;
    }

    .md-content strong { color: var(--text-primary); font-weight: 600; }
    .md-content em { color: var(--accent-purple); font-style: italic; }

    .md-content hr {
      border: none;
      border-top: 1px solid var(--glass-border);
      margin: 16px 0;
    }

    .md-content blockquote {
      border-left: 3px solid var(--accent-cyan);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 8px 0;
    }

    .last-refreshed {
      padding: 10px 24px;
      border-top: 1px solid var(--glass-border);
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .header { padding: 16px; flex-direction: column; gap: 16px; }
      .page-header { padding: 16px; }
      .layout { padding: 0 16px 16px; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="header">
    <div class="header-left">
      <h1>Clawdbot</h1>
      <div class="nav-links">
        <a href="/index.html" class="nav-link">🏠 Dashboard</a>
        <a href="/mail.html" class="nav-link">📧 Mail</a>
        <a href="/agents.html" class="nav-link">🎛️ Agents</a>
        <a href="/settings.html" class="nav-link">⚙️ Settings</a>
        <a href="/neural.html" class="nav-link">🧠 Neural</a>
        <a href="/logs.html" class="nav-link">📋 Logs</a>
        <a href="/identity.html" class="nav-link active">🧠 Identity</a>
        <a href="/logout" class="nav-link" style="color: var(--accent-rose, #ef4444);">⏏ Logout</a>
      </div>
    </div>
  </div>

  <div class="page-header">
    <h2>🧠 Agent Identity</h2>
    <p>Core files that define who I am</p>
  </div>

  <div class="layout">
    <!-- Left: file tree -->
    <div class="glass-panel" style="position:relative;">
      <!-- Search box -->
      <div style="padding:12px 14px 0; flex-shrink:0;">
        <div style="position:relative;">
          <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-muted);">🔍</span>
          <input id="searchInput" type="text" placeholder="Search workspace files…"
            style="width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--glass-border);border-radius:8px;
                   padding:7px 32px 7px 30px;color:var(--text-primary);font-size:12px;font-family:inherit;outline:none;
                   transition:border-color 0.2s;"
            onfocus="this.style.borderColor='var(--accent-cyan)'"
            onblur="this.style.borderColor='var(--glass-border)'"
            oninput="onSearchInput(this.value)"
          />
          <button id="searchClear" onclick="clearSearch()" title="Clear"
            style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;
                   color:var(--text-muted);cursor:pointer;font-size:14px;display:none;padding:0 2px;">✕</button>
        </div>
        <div id="searchStatus" style="font-size:11px;color:var(--text-muted);margin-top:5px;min-height:16px;"></div>
      </div>

      <!-- Search results (hidden by default) -->
      <div id="searchResults" style="display:none;overflow-y:auto;padding:0 14px 8px;flex:1 1 auto;"></div>

      <div class="file-tree" id="fileTree">
        <div style="color:var(--text-muted);font-size:12px;">Loading files…</div>
      </div>
    </div>

    <!-- Right: content viewer -->
    <div class="glass-panel content-panel" style="position:relative;">
      <div class="content-header">
        <div class="breadcrumb" id="breadcrumb">workspace / <span id="breadcrumbFile">—</span></div>
        <div class="file-meta-bar">
          <div class="meta-item"><span class="meta-label">Size:</span> <span id="metaSize">—</span></div>
          <div class="meta-item"><span class="meta-label">Modified:</span> <span id="metaMtime">—</span></div>
          <div class="refresh-indicator" id="refreshIndicator">⟳ refreshing…</div>
        </div>
      </div>

      <div class="content-body" id="contentBody">
        <div class="content-empty">
          <div class="empty-icon">🧠</div>
          <div>Select a file to view its contents</div>
        </div>
      </div>

      <div class="last-refreshed" id="lastRefreshed">Last refreshed: —</div>
    </div>
  </div>

  <script>
    const CORE_ICONS = {
      'AGENTS.md':    '🤖',
      'SOUL.md':      '💫',
      'IDENTITY.md':  '🪪',
      'USER.md':      '👤',
      'MEMORY.md':    '🧠',
      'HEARTBEAT.md': '💓',
      'TOOLS.md':     '🔧',
    };

    let currentFile = null;
    let refreshTimer = null;
    let memoryCollapsed = false;
    let allFiles = [];

    function fmtSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function daysAgo(mtime) {
      const d = Math.floor((Date.now() - new Date(mtime).getTime()) / 86400000);
      if (d === 0) return 'today';
      if (d === 1) return '1 day ago';
      return d + ' days ago';
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Simple markdown → HTML renderer (no external libs)
    function renderMarkdown(raw) {
      const lines = raw.split('\n');
      const out = [];
      let inCode = false;
      let codeLang = '';
      let codeLines = [];
      let inList = false;

      function flushList() {
        if (!inList) return;
        out.push('</ul>');
        inList = false;
      }

      function flushCode() {
        if (!inCode) return;
        out.push('<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>');
        inCode = false;
        codeLines = [];
      }

      function inlineRender(s) {
        // Bold+italic
        s = s.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
        // Bold
        s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        // Italic
        s = s.replace(/\*(.*?)\*/g, '<em>$1</em>');
        // Inline code
        s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
        // Links [text](url)
        s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:var(--accent-cyan)">$1</a>');
        return s;
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // Code fences
        if (line.startsWith('```')) {
          if (inCode) {
            flushCode();
          } else {
            flushList();
            inCode = true;
            codeLang = line.slice(3).trim();
            codeLines = [];
          }
          continue;
        }

        if (inCode) { codeLines.push(line); continue; }

        // HR
        if (/^---+$/.test(line.trim()) || /^\*\*\*+$/.test(line.trim())) {
          flushList();
          out.push('<hr>');
          continue;
        }

        // Headings
        const h4 = line.match(/^####\s+(.*)/);
        const h3 = line.match(/^###\s+(.*)/);
        const h2 = line.match(/^##\s+(.*)/);
        const h1 = line.match(/^#\s+(.*)/);
        if (h4) { flushList(); out.push('<h4>' + inlineRender(escapeHtml(h4[1])) + '</h4>'); continue; }
        if (h3) { flushList(); out.push('<h3>' + inlineRender(escapeHtml(h3[1])) + '</h3>'); continue; }
        if (h2) { flushList(); out.push('<h2>' + inlineRender(escapeHtml(h2[1])) + '</h2>'); continue; }
        if (h1) { flushList(); out.push('<h1>' + inlineRender(escapeHtml(h1[1])) + '</h1>'); continue; }

        // Blockquote
        if (line.startsWith('> ')) {
          flushList();
          out.push('<blockquote>' + inlineRender(escapeHtml(line.slice(2))) + '</blockquote>');
          continue;
        }

        // List items
        const li = line.match(/^[-*+]\s+(.*)/);
        if (li) {
          if (!inList) { out.push('<ul>'); inList = true; }
          out.push('<li>' + inlineRender(escapeHtml(li[1])) + '</li>');
          continue;
        }

        // Blank line
        if (line.trim() === '') {
          flushList();
          out.push('<p style="margin:6px 0;"></p>');
          continue;
        }

        // Normal paragraph
        flushList();
        out.push('<p>' + inlineRender(escapeHtml(line)) + '</p>');
      }

      flushList();
      flushCode();
      return out.join('\n');
    }

    function renderFileTree(files) {
      allFiles = files;
      const coreFiles = files.filter(f => f.category === 'core');
      const memFiles  = files.filter(f => f.category === 'memory');

      let html = '<div class="section-label">CORE FILES</div>';
      for (const f of coreFiles) {
        const icon = CORE_ICONS[f.name] || '📄';
        const active = currentFile === f.path ? ' active' : '';
        html += `<div class="file-item${active}" onclick="loadFile('${f.path}')" data-path="${f.path}">
          <span class="file-icon">${icon}</span>
          <div class="file-info">
            <div class="file-name">${escapeHtml(f.name)}</div>
            <div class="file-meta">${fmtSize(f.size)} · ${daysAgo(f.mtime)}</div>
          </div>
        </div>`;
      }

      const arrow = memoryCollapsed ? 'collapsed' : '';
      const listClass = memoryCollapsed ? 'collapsed' : '';
      html += `<div class="section-label memory-toggle" onclick="toggleMemory()">
        MEMORY LOGS (${memFiles.length})
        <span class="memory-toggle-arrow ${arrow}" id="memArrow">▾</span>
      </div>`;
      html += `<div class="memory-list ${listClass}" id="memoryList">`;
      for (const f of memFiles) {
        const active = currentFile === f.path ? ' active' : '';
        html += `<div class="file-item${active}" onclick="loadFile('${f.path}')" data-path="${f.path}">
          <span class="file-icon">📝</span>
          <div class="file-info">
            <div class="file-name">${escapeHtml(f.name)}</div>
            <div class="file-meta">${fmtSize(f.size)} · ${daysAgo(f.mtime)}</div>
          </div>
        </div>`;
      }
      html += '</div>';

      document.getElementById('fileTree').innerHTML = html;
    }

    function toggleMemory() {
      memoryCollapsed = !memoryCollapsed;
      const list = document.getElementById('memoryList');
      const arrow = document.getElementById('memArrow');
      if (memoryCollapsed) {
        list.classList.add('collapsed');
        arrow.classList.add('collapsed');
      } else {
        list.classList.remove('collapsed');
        arrow.classList.remove('collapsed');
      }
    }

    function updateActiveFile() {
      document.querySelectorAll('.file-item').forEach(el => {
        el.classList.toggle('active', el.dataset.path === currentFile);
      });
    }

    async function loadFile(filePath, silent) {
      if (!silent) {
        currentFile = filePath;
        updateActiveFile();
      }

      const indicator = document.getElementById('refreshIndicator');
      indicator.classList.add('visible');

      try {
        const res = await fetch('/api/workspace/file?path=' + encodeURIComponent(filePath));
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        if (!silent) {
          currentFile = filePath;
          updateActiveFile();
        }

        // Update header
        const parts = filePath.split('/');
        document.getElementById('breadcrumbFile').textContent = parts[parts.length - 1];
        document.getElementById('metaSize').textContent = fmtSize(data.size);
        document.getElementById('metaMtime').textContent = new Date(data.mtime).toLocaleString();

        // Render content
        document.getElementById('contentBody').innerHTML =
          '<div class="md-content">' + renderMarkdown(data.content) + '</div>';

        // Last refreshed
        document.getElementById('lastRefreshed').textContent =
          'Last refreshed: ' + new Date().toLocaleTimeString();

      } catch (e) {
        if (!silent) {
          document.getElementById('contentBody').innerHTML =
            '<div class="content-empty"><div class="empty-icon">⚠️</div><div>Failed to load file: ' + escapeHtml(e.message) + '</div></div>';
        }
      } finally {
        indicator.classList.remove('visible');
      }

      // Schedule next auto-refresh
      if (refreshTimer) clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => {
        if (currentFile) loadFile(currentFile, true);
      }, 30000);
    }

    // ── Workspace search ─────────────────────────────────────────────────
    let searchTimer = null;

    function onSearchInput(val) {
      document.getElementById('searchClear').style.display = val ? 'block' : 'none';
      clearTimeout(searchTimer);
      if (!val.trim()) {
        clearSearch(true);
        return;
      }
      document.getElementById('searchStatus').textContent = 'Searching…';
      searchTimer = setTimeout(() => runSearch(val.trim()), 350);
    }

    function clearSearch(keepInput) {
      if (!keepInput) document.getElementById('searchInput').value = '';
      document.getElementById('searchClear').style.display = 'none';
      document.getElementById('searchStatus').textContent = '';
      document.getElementById('searchResults').style.display = 'none';
      document.getElementById('fileTree').style.display = '';
    }

    async function runSearch(query) {
      if (query.length < 2) { document.getElementById('searchStatus').textContent = 'Type at least 2 characters'; return; }
      try {
        const res = await fetch('/api/workspace/search?q=' + encodeURIComponent(query));
        const data = await res.json();
        if (!res.ok) { document.getElementById('searchStatus').textContent = '⚠️ ' + (data.error || 'Error'); return; }

        renderSearchResults(data, query);
      } catch (e) {
        document.getElementById('searchStatus').textContent = '⚠️ Request failed';
      }
    }

    function highlightQuery(text, query) {
      const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return escapeHtml(text).replace(new RegExp(esc, 'gi'), m => `<mark style="background:rgba(251,191,36,0.3);color:var(--accent-amber);border-radius:2px;padding:0 1px;">${m}</mark>`);
    }

    function renderSearchResults(data, query) {
      const { results, totalFiles, totalMatches } = data;
      const statusEl = document.getElementById('searchStatus');
      const resultsEl = document.getElementById('searchResults');

      if (totalMatches === 0) {
        statusEl.textContent = 'No matches found';
        resultsEl.style.display = 'none';
        document.getElementById('fileTree').style.display = '';
        return;
      }

      statusEl.innerHTML = `<span style="color:var(--accent-cyan);">${totalMatches} match${totalMatches !== 1 ? 'es' : ''}</span> in ${totalFiles} file${totalFiles !== 1 ? 's' : ''}`;
      document.getElementById('fileTree').style.display = 'none';
      resultsEl.style.display = 'block';

      // Group by file
      const byFile = {};
      for (const r of results) {
        if (!byFile[r.file]) byFile[r.file] = [];
        byFile[r.file].push(r);
      }

      let html = '';
      for (const [filePath, matches] of Object.entries(byFile)) {
        const icon = CORE_ICONS[filePath.split('/').pop()] || (filePath.startsWith('memory/') ? '📝' : '📄');
        html += `<div style="margin-bottom:10px;">
          <div onclick="loadFile('${escapeHtml(filePath)}'); clearSearch(true);"
               style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;cursor:pointer;
                      background:rgba(6,182,212,0.08);border:1px solid rgba(6,182,212,0.2);margin-bottom:4px;
                      transition:background 0.15s;"
               onmouseover="this.style.background='rgba(6,182,212,0.16)'"
               onmouseout="this.style.background='rgba(6,182,212,0.08)'">
            <span style="font-size:13px;">${icon}</span>
            <span style="font-size:12px;font-weight:500;color:var(--text-primary);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(filePath)}</span>
            <span style="font-size:10px;color:var(--accent-cyan);flex-shrink:0;">${matches.length} hit${matches.length !== 1 ? 's' : ''}</span>
          </div>`;
        for (const m of matches) {
          html += `<div style="padding:3px 8px 3px 28px;font-size:11px;color:var(--text-muted);font-family:'SF Mono','Fira Code',monospace;
                               white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.6;"
                       title="Line ${m.line}: ${m.text}">
            <span style="color:var(--text-muted);opacity:0.6;margin-right:6px;">${m.line}</span>${highlightQuery(m.text, query)}
          </div>`;
        }
        html += '</div>';
      }

      resultsEl.innerHTML = html;
    }

    async function initPage() {
      try {
        const res = await fetch('/api/workspace/files');
        const data = await res.json();
        renderFileTree(data.files);
        // Auto-load AGENTS.md
        const agents = data.files.find(f => f.path === 'AGENTS.md');
        if (agents) loadFile('AGENTS.md');
      } catch (e) {
        document.getElementById('fileTree').innerHTML =
          '<div style="color:var(--accent-rose);font-size:12px;">Error loading files: ' + escapeHtml(e.message) + '</div>';
      }
    }

    initPage();
  </script>
</body>
</html>
