<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0, viewport-fit=cover">
  <title>📧 Clawdbot Mail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0e17;
      --bg-secondary: #0f1420;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent-cyan: #06b6d4;
      --accent-purple: #8b5cf6;
      --accent-pink: #ec4899;
      --accent-emerald: #10b981;
      --gradient-primary: linear-gradient(135deg, #06b6d4, #8b5cf6, #ec4899);
      /* Short aliases */
      --bg: #0a0e17; --bg2: #0f1420; --bg3: #131825;
      --glass: rgba(255,255,255,.04); --border: rgba(255,255,255,.08);
      --text: #f1f5f9; --text2: #94a3b8; --muted: #64748b;
      --cyan: #06b6d4; --purple: #8b5cf6; --green: #10b981; --amber: #f59e0b; --red: #f43f5e;
      --gradient: linear-gradient(135deg,#06b6d4,#8b5cf6,#ec4899);
      --accent-red: #ef4444;
    }

    @keyframes backgroundPulse {
      0%, 100% {
        opacity: 0.4;
        transform: scale(1);
      }
      50% {
        opacity: 0.6;
        transform: scale(1.1);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }
      100% {
        background-position: 200% 0;
      }
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(6, 182, 212, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139, 92, 246, 0.12), transparent),
        radial-gradient(ellipse 50% 30% at 50% 50%, rgba(236, 72, 153, 0.08), transparent);
      pointer-events: none;
      z-index: 0;
      animation: backgroundPulse 15s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(circle at 30% 30%, rgba(6, 182, 212, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 70% 70%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .main-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    .header {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      animation: fadeIn 0.5s ease-out;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--gradient-primary);
      opacity: 0.3;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .header a:hover {
      color: var(--accent-cyan);
      border-color: rgba(6, 182, 212, 0.3);
      background: rgba(6, 182, 212, 0.1);
      transform: translateX(-4px);
    }

    .nav-tabs {
      display: flex;
      gap: 8px;
      padding: 16px 32px 0;
      background: transparent;
      position: relative;
      animation: fadeIn 0.6s ease-out;
    }

    .nav-tab {
      padding: 12px 24px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      border-radius: 12px 12px 0 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-bottom: none;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-tab::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      background: var(--gradient-primary);
      transition: opacity 0.3s ease;
      z-index: -1;
    }

    .nav-tab:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-2px);
    }

    .nav-tab.active {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .nav-tab.active::before {
      opacity: 0.15;
    }

    .nav-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--gradient-primary);
      border-radius: 2px 2px 0 0;
    }

    .folder-count {
      background: rgba(6, 182, 212, 0.15);
      color: var(--accent-cyan);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: 4px;
      border: 1px solid rgba(6, 182, 212, 0.2);
    }

    .container {
      padding: 0 32px 32px;
      animation: fadeIn 0.7s ease-out;
    }

    .mail-list {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 0 16px 16px 16px;
      overflow: hidden;
      margin-top: -1px;
    }

    .mail-item {
      display: grid;
      grid-template-columns: 48px 200px 1fr 120px;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--glass-border);
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      animation: slideIn 0.4s ease-out backwards;
    }

    .mail-item:nth-child(1) { animation-delay: 0.05s; }
    .mail-item:nth-child(2) { animation-delay: 0.1s; }
    .mail-item:nth-child(3) { animation-delay: 0.15s; }
    .mail-item:nth-child(4) { animation-delay: 0.2s; }
    .mail-item:nth-child(5) { animation-delay: 0.25s; }
    .mail-item:nth-child(6) { animation-delay: 0.3s; }
    .mail-item:nth-child(7) { animation-delay: 0.35s; }
    .mail-item:nth-child(8) { animation-delay: 0.4s; }
    .mail-item:nth-child(9) { animation-delay: 0.45s; }
    .mail-item:nth-child(10) { animation-delay: 0.5s; }

    .mail-item:last-child {
      border-bottom: none;
    }

    .mail-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gradient-primary);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .mail-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .mail-item:hover::before {
      opacity: 0.05;
    }

    .mail-item:hover .mail-icon {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
    }

    .mail-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .mail-icon.received {
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(6, 182, 212, 0.1));
      color: var(--accent-cyan);
      border: 1px solid rgba(6, 182, 212, 0.2);
    }

    .mail-icon.sent {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(139, 92, 246, 0.1));
      color: var(--accent-purple);
      border: 1px solid rgba(139, 92, 246, 0.2);
    }

    .mail-from {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
      z-index: 1;
    }

    .mail-subject {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-secondary);
      position: relative;
      z-index: 1;
    }

    .mail-date {
      text-align: right;
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      position: relative;
      z-index: 1;
    }

    .mail-view {
      display: none;
      padding: 32px;
      max-width: 1200px;
      margin: 0 auto;
      animation: fadeIn 0.5s ease-out;
    }

    .mail-view.active {
      display: block;
    }

    .back-btn {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      color: var(--accent-cyan);
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn:hover {
      background: rgba(6, 182, 212, 0.1);
      border-color: rgba(6, 182, 212, 0.3);
      transform: translateX(-4px);
      box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
    }

    .mail-view-header {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .mail-view-subject {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 16px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.01em;
    }

    .mail-view-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-secondary);
      font-size: 13px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .mail-view-meta strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .mail-view-body {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 32px;
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: 14px;
      color: var(--text-primary);
      min-height: 200px;
      position: relative;
    }

    .mail-view-body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--gradient-primary);
      border-radius: 16px 16px 0 0;
      opacity: 0.5;
    }

    .loading, .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 500;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 0 16px 16px 16px;
      margin-top: -1px;
    }

    .loading::before, .empty-state::before {
      content: '';
      display: block;
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      opacity: 0.3;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.3;
      }
      50% {
        transform: scale(1.1);
        opacity: 0.5;
      }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--accent-cyan), var(--accent-purple));
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, var(--accent-purple), var(--accent-pink));
    }

    /* Selection styling */
    ::selection {
      background: rgba(6, 182, 212, 0.3);
      color: var(--text-primary);
    }

    /* Focus states */
    .nav-tab:focus-visible,
    .back-btn:focus-visible {
      outline: 2px solid var(--accent-cyan);
      outline-offset: 2px;
    }

    /* ── Mail Stats Strip ─────────────────────────────────────────────── */
    .mail-stats-strip {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px 32px 14px;
      animation: fadeIn 0.65s ease-out;
    }

    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 7px 14px;
      backdrop-filter: blur(10px);
      font-size: 13px;
      transition: border-color 0.3s ease;
    }

    .stat-chip:hover {
      border-color: rgba(6, 182, 212, 0.3);
    }

    .stat-chip .stat-icon {
      font-size: 14px;
    }

    .stat-chip .stat-label {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .stat-chip .stat-value {
      color: var(--accent-cyan);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .stat-chip .stat-value.zero {
      color: var(--text-secondary);
    }

    .stats-sep {
      color: rgba(255, 255, 255, 0.15);
      font-size: 18px;
      line-height: 1;
      user-select: none;
    }

    .top-senders-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(139, 92, 246, 0.07);
      border: 1px solid rgba(139, 92, 246, 0.18);
      border-radius: 10px;
      padding: 7px 14px;
      backdrop-filter: blur(10px);
      font-size: 13px;
    }

    .top-senders-chip .sender-name {
      color: var(--accent-purple);
      font-weight: 600;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-senders-chip .sender-count {
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 500;
    }

    .nav-links { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: 8px; background: var(--glass-bg); border: 1px solid var(--glass-border); transition: all .2s; }
    .nav-links a:hover { color: var(--accent-cyan); border-color: rgba(6,182,212,.3); background: rgba(6,182,212,.1); }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .header {
        padding: 16px 20px;
      }

      .header h1 {
        font-size: 20px;
      }

      .nav-tabs {
        padding: 12px 20px 0;
        gap: 4px;
      }

      .nav-tab {
        padding: 10px 16px;
        font-size: 13px;
      }

      .container {
        padding: 0 16px 24px;
      }

      .mail-item {
        grid-template-columns: 40px 1fr;
        grid-template-rows: auto auto;
        gap: 4px 12px;
        padding: 14px 16px;
      }

      .mail-from {
        grid-column: 2;
      }

      .mail-subject {
        grid-column: 2;
      }

      .mail-date {
        grid-column: 1 / -1;
        text-align: left;
        padding-left: 52px;
      }

      .mail-view {
        padding: 20px 16px;
      }

      .mail-view-subject {
        font-size: 20px;
      }

      .mail-view-body {
        padding: 20px;
      }
    }
  </style>
  <link rel="stylesheet" href="/responsive.css">
  <link rel="stylesheet" href="/design-system.css">
  <link rel="stylesheet" href="/overrides.css">
</head>
<body>
  <div class="main-wrapper">
    <div class="header">
      <h1>📧 Clawdbot Mail</h1>
      <button class="mobile-menu-btn" onclick="toggleMobileNav()">☰</button>
      <div class="mobile-overlay" onclick="toggleMobileNav()"></div>
      <div class="nav-links">
        <a href="/">📊 Dashboard</a>
        <a href="/live.html">🔴 Live</a>
        <a href="/chat.html">💬 Chat</a>
        <a href="/analytics.html">📈 Analytics</a>
        <a href="/agents-control.html">🎛️ Agents</a>
        <a href="/memory.html">🧠 Memory</a>
        <a href="/files.html">🗂️ Files</a>
        <a href="/crons.html">⏰ Crons</a><a href="/neural.html">🧬 Neural</a>
        <a href="/settings.html">⚙️ Settings</a>
        <a href="/logout" style="color:var(--accent-red,#ef4444)">⏏ Logout</a>
      </div>
    </div>
    <div class="nav-tabs">
      <div class="nav-tab active" data-folder="INBOX" onclick="switchFolder('INBOX')">
        📥 Inbox <span class="folder-count" id="inbox-count">...</span>
      </div>
      <div class="nav-tab" data-folder="Sent" onclick="switchFolder('Sent')">
        📤 Sent <span class="folder-count" id="sent-count">...</span>
      </div>
    </div>
    <!-- ── Mail Stats Strip ───────────────────────────────────────────── -->
    <div class="mail-stats-strip" id="mailStatsStrip" style="display:none">
      <div class="stat-chip">
        <span class="stat-icon">📥</span>
        <span class="stat-label">Inbox</span>
        <span class="stat-value" id="statInbox">—</span>
      </div>
      <div class="stat-chip">
        <span class="stat-icon">📅</span>
        <span class="stat-label">Today</span>
        <span class="stat-value" id="statToday">—</span>
      </div>
      <div class="stat-chip">
        <span class="stat-icon">📤</span>
        <span class="stat-label">Sent</span>
        <span class="stat-value" id="statSent">—</span>
      </div>
      <span class="stats-sep">·</span>
      <div class="top-senders-chip" id="statTopSendersWrap" style="display:none">
        <span class="stat-icon">👤</span>
        <span class="stat-label" style="color:var(--text-secondary);font-weight:500">Top:</span>
        <span class="sender-name" id="statTopName">—</span>
        <span class="sender-count" id="statTopCount"></span>
      </div>
    </div>

    <div class="container">
      <div class="loading" id="loading">Loading emails...</div>
      <div class="mail-list" id="mailList"></div>
      <div class="mail-view" id="mailView">
        <button class="back-btn" onclick="showList()">← Back to list</button>
        <div class="mail-view-header">
          <div class="mail-view-subject" id="viewSubject"></div>
          <div class="mail-view-meta">
            <div><strong id="viewFrom"></strong> → <span id="viewTo"></span></div>
            <div id="viewDate"></div>
          </div>
        </div>
        <div class="mail-view-body" id="viewBody"></div>
      </div>
    </div>
  </div>

  <script>
    let currentFolder='INBOX';let emailCache={};
    function logout(event){if(event)event.preventDefault();fetch('/logout',{method:'POST'}).then(function(){window.location='/login';});}
    function renderMailList(folder,emails){if(!emails||!emails.length)return'<div class="empty-state">No emails in this folder</div>';return emails.map(function(e){var isSent=folder==='Sent';var icon=isSent?'sent':'received';var initial=(isSent?(e.to||'?'):(e.from||'?')).charAt(0).toUpperCase();var person=isSent?(e.to||'Unknown'):(e.from||'Unknown');return'<div class="mail-item" onclick="viewEmail(\''+folder+'\','+e.id+')"><div class="mail-icon '+icon+'">'+initial+'</div><div class="mail-from">'+escapeHtml(person)+'</div><div class="mail-subject">'+escapeHtml(e.subject||'(no subject)')+'</div><div class="mail-date">'+escapeHtml(e.date||'')+'</div></div>'}).join('')}
    async function switchFolder(folder){currentFolder=folder;document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.querySelector('[data-folder="'+folder+'"]').classList.add('active');await loadEmails(folder)}
    async function loadEmails(folder){var list=document.getElementById('mailList'),loading=document.getElementById('loading'),view=document.getElementById('mailView');list.style.display='none';view.classList.remove('active');loading.style.display='block';try{var res=await fetch('/api/mail/list?folder='+encodeURIComponent(folder));var data=await res.json();if(folder==='INBOX')document.getElementById('inbox-count').textContent=data.emails?.length||0;if(folder==='Sent')document.getElementById('sent-count').textContent=data.emails?.length||0;emailCache={};list.innerHTML=renderMailList(folder,data.emails||[]);loading.style.display='none';list.style.display='block'}catch(err){loading.textContent='Failed: '+err.message}}
    async function viewEmail(folder,id){var key=folder+':'+id;var list=document.getElementById('mailList'),view=document.getElementById('mailView');list.style.display='none';if(emailCache[key]){renderEmail(emailCache[key]);return}document.getElementById('viewSubject').textContent='Loading...';document.getElementById('viewFrom').textContent='';document.getElementById('viewTo').textContent='';document.getElementById('viewDate').textContent='';document.getElementById('viewBody').textContent='';view.classList.add('active');try{var res=await fetch('/api/mail/read?folder='+encodeURIComponent(folder)+'&id='+id);var data=await res.json();emailCache[key]=data;renderEmail(data)}catch(err){document.getElementById('viewBody').textContent='Error: '+err.message}}
    function renderEmail(data){document.getElementById('viewSubject').textContent=data.subject||'(no subject)';document.getElementById('viewFrom').textContent=data.from||'Unknown';document.getElementById('viewTo').textContent=data.to||'Unknown';document.getElementById('viewDate').textContent=data.date||'';document.getElementById('viewBody').textContent=data.body||'(empty)';document.getElementById('mailView').classList.add('active')}
    function showList(){document.getElementById('mailView').classList.remove('active');document.getElementById('mailList').style.display='block'}
    function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
    // Silent background refresh — updates list without hiding content or interrupting view
    async function silentRefresh(folder){
      try{
        var res=await fetch('/api/mail/list?folder='+encodeURIComponent(folder));
        var data=await res.json();
        var list=document.getElementById('mailList');
        if(folder===currentFolder&&list.style.display!=='none'){
          if(folder==='INBOX')document.getElementById('inbox-count').textContent=data.emails?.length||0;
          if(folder==='Sent')document.getElementById('sent-count').textContent=data.emails?.length||0;
          if(data.emails?.length){
            list.innerHTML=renderMailList(folder,data.emails||[])
          }
        }
      }catch(e){/* silent — stale data remains */}
    }
    // ── Mail Stats Strip ──────────────────────────────────────────────
    async function loadMailStats() {
      try {
        const res = await fetch('/api/mail/stats');
        if (!res.ok) return;
        const d = await res.json();
        const strip = document.getElementById('mailStatsStrip');
        const elInbox = document.getElementById('statInbox');
        const elToday = document.getElementById('statToday');
        const elSent  = document.getElementById('statSent');
        const topWrap = document.getElementById('statTopSendersWrap');
        const topName = document.getElementById('statTopName');
        const topCnt  = document.getElementById('statTopCount');

        elInbox.textContent = d.inboxCount ?? '—';
        elInbox.className = 'stat-value' + (d.inboxCount === 0 ? ' zero' : '');

        elToday.textContent = d.todayCount ?? '—';
        elToday.className = 'stat-value' + (d.todayCount === 0 ? ' zero' : '');

        elSent.textContent = d.sentCount ?? '—';
        elSent.className = 'stat-value' + (d.sentCount === 0 ? ' zero' : '');

        if (d.topSenders && d.topSenders.length > 0) {
          const top = d.topSenders[0];
          topName.textContent = top.name.length > 22 ? top.name.slice(0, 22) + '…' : top.name;
          topName.title = top.name;
          topCnt.textContent = `(${top.count})`;
          topWrap.style.display = '';
        }

        strip.style.display = '';
      } catch (e) { /* silent — stats are non-critical */ }
    }

    loadEmails('INBOX');fetch('/api/mail/list?folder=Sent').then(r=>r.json()).then(d=>{document.getElementById('sent-count').textContent=d.emails?.length||0}).catch(function(){});
    loadMailStats();
    // Auto-refresh current folder every 30s (silent — no spinner flash)
    setInterval(function(){silentRefresh(currentFolder);}, 30000);
    // Refresh stats every 60s
    setInterval(loadMailStats, 60000);

    function toggleMobileNav(){
      var nav = document.querySelector('.nav-links');
      if(nav) nav.classList.toggle('open');
      var o = document.querySelector('.mobile-overlay');
      if(o) o.classList.toggle('open');
    }
  </script>
  <script src="/nav.js"></script>
</body>
</html>
